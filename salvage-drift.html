<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvage Drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:crosshair}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();addEventListener('resize',resize);

const WORLD=5000,SHIP_R=14,STATION_R=80,GRAB_R=80,MARGIN=200;
const FRICTION=0.997,THRUST=0.15,STRAFE_THRUST=0.09,ROT_LERP=0.12,MAX_SPD=6;

let state='menu',credits=0,totalCredits=0,hp=3,maxHp=3,wave=1,shakeX=0,shakeY=0,shakeMag=0;
let ship,debris=[],asteroids=[],particles=[],stars=[],towing=[],drones=[];
let keys={},mouse={x:0,y:0,world:{x:0,y:0}};
let runTimer=0,totalRuns=0,bestWave=0,bestCredits=0;
let floatingTexts=[];

// ─── Persistent upgrades ───
let upgrades={
  engine:   {level:0,max:10,name:'Ion Thrusters',    desc:'+8% speed',          cost:l=>150+l*120,   effect:l=>1+l*0.08},
  hull:     {level:0,max:8, name:'Reinforced Hull',   desc:'+1 max HP',          cost:l=>200+l*180,   effect:l=>3+l},
  cargo:    {level:0,max:6, name:'Cargo Bay',         desc:'+1 tow capacity',    cost:l=>300+l*250,   effect:l=>1+l},
  magnet:   {level:0,max:8, name:'Tractor Magnet',    desc:'+20% grab range',    cost:l=>100+l*90,    effect:l=>1+l*0.2},
  armor:    {level:0,max:5, name:'Armor Plating',     desc:'-15% collision dmg',  cost:l=>400+l*350,   effect:l=>l*0.15},
  drone:    {level:0,max:5, name:'Salvage Drone',     desc:'+1 auto-collect drone',cost:l=>500+l*400,  effect:l=>l},
  magnetism:{level:0,max:6, name:'Station Magnet',    desc:'Debris pulled +15%',  cost:l=>200+l*160,   effect:l=>l*0.15},
};

let persistentCredits=0;
function saveGame(){
  let data={credits:persistentCredits,upgrades:{},totalRuns,bestWave,bestCredits};
  for(let k in upgrades)data.upgrades[k]=upgrades[k].level;
  localStorage.setItem('salvage_drift',JSON.stringify(data));
}
function loadGame(){
  try{
    let d=JSON.parse(localStorage.getItem('salvage_drift'));
    if(!d)return;
    persistentCredits=d.credits||0;
    totalRuns=d.totalRuns||0;
    bestWave=d.bestWave||0;
    bestCredits=d.bestCredits||0;
    for(let k in d.upgrades)if(upgrades[k])upgrades[k].level=d.upgrades[k];
  }catch(e){}
}
loadGame();

const rand=(a,b)=>Math.random()*(b-a)+a;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function getMaxTow(){return upgrades.cargo.effect(upgrades.cargo.level)}
function getSpeedMult(){return upgrades.engine.effect(upgrades.engine.level)}
function getGrabRange(){return GRAB_R*upgrades.magnet.effect(upgrades.magnet.level)}
function getDmgReduction(){return upgrades.armor.effect(upgrades.armor.level)}
function getStationPull(){return upgrades.magnetism.effect(upgrades.magnetism.level)}
function getMaxHp(){return upgrades.hull.effect(upgrades.hull.level)}
function getDroneCount(){return upgrades.drone.effect(upgrades.drone.level)}

function initStars(){stars=[];for(let i=0;i<300;i++)stars.push({x:rand(0,WORLD),y:rand(0,WORLD),s:rand(0.5,2),p:rand(0.05,0.2),b:rand(0.3,1)})}
function initShip(){ship={x:WORLD/2,y:WORLD/2,vx:0,vy:0,angle:0,thrusting:false}}

const DEBRIS_TYPES=[
  {name:'scrap',mass:1,r:12,sides:4,color:'#e8922a',credits:50},
  {name:'cargo',mass:2.5,r:22,sides:5,color:'#d4760a',credits:120},
  {name:'hull section',mass:5,r:35,sides:6,color:'#c25a0a',credits:250},
  {name:'rare alloy',mass:3,r:18,sides:7,color:'#aa44ff',credits:400},
];

function spawnDebris(){
  let weights=[0.45,0.3,0.15,0.1];
  let r=Math.random(),cum=0,t;
  for(let i=0;i<weights.length;i++){cum+=weights[i];if(r<cum){t=DEBRIS_TYPES[i];break}}
  if(!t)t=DEBRIS_TYPES[0];
  let angle=rand(0,Math.PI*2),d=rand(400,WORLD/2-100);
  debris.push({
    ...t,x:WORLD/2+Math.cos(angle)*d,y:WORLD/2+Math.sin(angle)*d,
    rot:rand(0,6.28),rotSpd:rand(-0.02,0.02),vx:rand(-0.3,0.3),vy:rand(-0.3,0.3),
    verts:makePoly(t.r,t.sides,0.3)
  });
}

function makePoly(r,n,jag){
  let v=[];for(let i=0;i<n;i++){let a=6.2832/n*i;v.push({x:Math.cos(a)*r*rand(1-jag,1),y:Math.sin(a)*r*rand(1-jag,1)})}
  return v;
}

function spawnAsteroid(){
  let r=rand(15,45),x,y,side=Math.floor(rand(0,4));
  if(side===0){x=rand(0,WORLD);y=rand(-MARGIN,0)}
  else if(side===1){x=rand(0,WORLD);y=rand(WORLD,WORLD+MARGIN)}
  else if(side===2){x=rand(-MARGIN,0);y=rand(0,WORLD)}
  else{x=rand(WORLD,WORLD+MARGIN);y=rand(0,WORLD)}
  let spd=rand(0.3,1.2+wave*0.08),ang=rand(0,6.28),sides=Math.floor(rand(6,10));
  let isMobile=Math.random()<0.35+wave*0.05;
  asteroids.push({
    x,y,r,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    rot:rand(0,6.28),rotSpd:rand(-0.01,0.01),
    color:`hsl(${rand(20,50)},${rand(10,30)}%,${rand(25,45)}%)`,
    verts:makePoly(r,sides,0.35),
    mobile:isMobile,mobileSpd:isMobile?rand(0.5,1.5+wave*0.1):0,
    mobileAngle:rand(0,6.28),mobileTimer:rand(0,200),glowPhase:rand(0,6.28)
  });
}

function addFloat(x,y,text,color){
  floatingTexts.push({x,y,text,color,life:1.5,vy:-1.5});
}

function emitSparks(x,y,col,n){
  for(let i=0;i<n;i++){let a=rand(0,6.28);particles.push({x,y,vx:Math.cos(a)*rand(1,4),vy:Math.sin(a)*rand(1,4),life:1,decay:rand(0.03,0.06),s:rand(1,3),color:col})}
}

function emitDelivery(x,y){
  for(let i=0;i<40;i++){let a=rand(0,6.28),sp=rand(1,5);particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:rand(0.015,0.03),s:rand(2,5),color:'credit'})}
}

function emitBeamGrab(x,y){
  for(let i=0;i<10;i++){let a=rand(0,6.28);particles.push({x,y,vx:Math.cos(a)*rand(0.5,2),vy:Math.sin(a)*rand(0.5,2),life:1,decay:rand(0.04,0.08),s:rand(1,3),color:'beam'})}
}

function initGame(){
  credits=0;wave=1;towing=[];debris=[];asteroids=[];particles=[];drones=[];floatingTexts=[];
  hp=getMaxHp();maxHp=hp;
  initStars();initShip();
  for(let i=0;i<8;i++)spawnDebris();
  for(let i=0;i<4;i++)spawnAsteroid();
  // Spawn drones
  for(let i=0;i<getDroneCount();i++){
    drones.push({x:ship.x+rand(-50,50),y:ship.y+rand(-50,50),target:null});
  }
  runTimer=0;
}

addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();handleSpace()}
  if(e.code==='KeyU'&&state==='play'){state='shop';return}
  if(e.code==='KeyU'&&state==='shop'){state='play';return}
});
addEventListener('keyup',e=>{keys[e.code]=false});
addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
addEventListener('mousedown',()=>handleClick());

function handleSpace(){
  if(state==='menu'){state='play';initGame();return}
  if(state==='over'){
    // Bank credits
    persistentCredits+=credits;
    totalCredits+=credits;
    totalRuns++;
    if(wave>bestWave)bestWave=wave;
    if(credits>bestCredits)bestCredits=credits;
    saveGame();
    state='menu';return;
  }
  if(state==='shop'){state='play';return}
}

function handleClick(){
  if(state==='menu'){state='play';initGame();return}
  if(state==='over'){
    persistentCredits+=credits;totalCredits+=credits;totalRuns++;
    if(wave>bestWave)bestWave=wave;if(credits>bestCredits)bestCredits=credits;
    saveGame();state='menu';return;
  }
  if(state==='shop'){
    // Check upgrade clicks
    handleShopClick();return;
  }
  if(state!=='play')return;
  let wx=ship.x-W/2+mouse.x,wy=ship.y-H/2+mouse.y;
  let best=null,bd=getGrabRange()*1.2;
  for(let d of debris){
    if(towing.includes(d))continue;
    let dd=dist({x:wx,y:wy},d);if(dd<bd){bd=dd;best=d}
  }
  if(best&&towing.length<getMaxTow()){towing.push(best);emitBeamGrab(best.x,best.y)}
}

function getTowMass(){return towing.reduce((s,d)=>s+d.mass,0)}

let lastT=0;
function update(dt){
  if(state==='shop')return;
  if(state!=='play')return;
  dt=Math.min(dt,0.05);
  runTimer+=dt;

  let wx=ship.x-W/2+mouse.x,wy=ship.y-H/2+mouse.y;
  mouse.world.x=wx;mouse.world.y=wy;
  let targetAngle=Math.atan2(wy-ship.y,wx-ship.x);
  let diff=targetAngle-ship.angle;
  while(diff>Math.PI)diff-=6.2832;while(diff<-Math.PI)diff+=6.2832;
  ship.angle+=diff*ROT_LERP;

  let tx=0,ty=0;
  let fwdX=Math.cos(ship.angle),fwdY=Math.sin(ship.angle);
  let strafeX=Math.cos(ship.angle-1.5708),strafeY=Math.sin(ship.angle-1.5708);
  if(keys['KeyW']||keys['ArrowUp']){tx+=fwdX*THRUST;ty+=fwdY*THRUST}
  if(keys['KeyS']||keys['ArrowDown']){tx-=fwdX*THRUST*0.5;ty-=fwdY*THRUST*0.5}
  if(keys['KeyA']||keys['ArrowLeft']){tx+=strafeX*STRAFE_THRUST;ty+=strafeY*STRAFE_THRUST}
  if(keys['KeyD']||keys['ArrowRight']){tx-=strafeX*STRAFE_THRUST;ty-=strafeY*STRAFE_THRUST}

  ship.thrusting=(tx!==0||ty!==0);
  let towMass=getTowMass();
  let spdMult=getSpeedMult()/(1+towMass*0.35);
  ship.vx+=tx*spdMult;ship.vy+=ty*spdMult;
  ship.vx*=FRICTION;ship.vy*=FRICTION;

  let spd=Math.hypot(ship.vx,ship.vy);
  let maxSpd=MAX_SPD*spdMult;
  if(spd>maxSpd){ship.vx*=maxSpd/spd;ship.vy*=maxSpd/spd}

  ship.x+=ship.vx;ship.y+=ship.vy;
  ship.x=clamp(ship.x,20,WORLD-20);ship.y=clamp(ship.y,20,WORLD-20);

  if(ship.thrusting&&Math.random()<0.6){
    let pa=Math.atan2(-ty,-tx)+rand(-0.3,0.3);
    particles.push({x:ship.x-Math.cos(Math.atan2(ty,tx))*SHIP_R*0.6,y:ship.y-Math.sin(Math.atan2(ty,tx))*SHIP_R*0.6,
      vx:Math.cos(pa)*rand(1,3)+ship.vx*0.2,vy:Math.sin(pa)*rand(1,3)+ship.vy*0.2,
      life:1,decay:rand(0.02,0.05),s:rand(1.5,3.5),color:'thrust'});
  }

  // Towed debris
  for(let i=0;i<towing.length;i++){
    let d=towing[i],dx=ship.x-d.x,dy=ship.y-d.y,d2=Math.hypot(dx,dy)||1;
    let target=SHIP_R+d.r+10+i*8;
    let pull=(d2-target)*0.06;
    d.vx=lerp(d.vx,ship.vx*0.8,0.1);d.vy=lerp(d.vy,ship.vy*0.8,0.1);
    d.vx+=dx/d2*pull;d.vy+=dy/d2*pull;
    d.x+=d.vx;d.y+=d.vy;d.rot+=d.rotSpd*0.5;
  }

  for(let d of debris){
    if(towing.includes(d))continue;
    d.x+=d.vx;d.y+=d.vy;d.rot+=d.rotSpd;d.vx*=0.998;d.vy*=0.998;
  }

  // Station magnetism — pull nearby loose debris toward station
  let pull=getStationPull();
  if(pull>0){
    for(let d of debris){
      if(towing.includes(d))continue;
      let dd=dist(d,{x:WORLD/2,y:WORLD/2});
      if(dd<STATION_R*4){
        let dx=WORLD/2-d.x,dy=WORLD/2-d.y;
        d.vx+=dx/dd*pull*0.02;d.vy+=dy/dd*pull*0.02;
      }
    }
  }

  // Drone AI
  for(let drone of drones){
    // Follow ship loosely
    let dx=ship.x-drone.x,dy=ship.y-drone.y,dd=Math.hypot(dx,dy)||1;
    if(dd>80){drone.x+=dx/dd*2;drone.y+=dy/dd*2}
    // Find nearest untowed debris
    if(!drone.target||!debris.includes(drone.target)||towing.includes(drone.target)){
      drone.target=null;
      let best=null,bd=400;
      for(let d of debris){
        if(towing.includes(d))continue;
        let ddd=dist(drone,d);if(ddd<bd){bd=ddd;best=d}
      }
      drone.target=best;
    }
    if(drone.target){
      let dx2=drone.target.x-drone.x,dy2=drone.target.y-drone.y,dd2=Math.hypot(dx2,dy2)||1;
      drone.x+=dx2/dd2*1.5;drone.y+=dy2/dd2*1.5;
      // Auto-deliver if near station
      if(dist(drone.target,{x:WORLD/2,y:WORLD/2})<STATION_R+drone.target.r+20){
        let bonus=drone.target.credits;
        credits+=bonus;
        addFloat(drone.target.x,drone.target.y,'+'+bonus+' CR','#ffd700');
        emitDelivery(drone.target.x,drone.target.y);
        debris=debris.filter(d=>d!==drone.target);
        towing=towing.filter(d=>d!==drone.target);
        drone.target=null;
        let newWave=Math.floor(credits/500)+1;
        if(newWave>wave)wave=newWave;
      }
    }
  }

  // Mobile asteroids
  for(let a of asteroids){
    if(a.mobile){
      a.mobileTimer++;
      if(a.mobileTimer>rand(120,300)){
        a.mobileTimer=0;
        let nearD=null,nd=Infinity;
        for(let d of debris){let dd=dist(a,d);if(dd<nd){nd=dd;nearD=d}}
        if(nearD&&nd<800)a.mobileAngle=Math.atan2(nearD.y-a.y,nearD.x-a.x);
        else a.mobileAngle+=rand(-1,1);
      }
      a.vx=lerp(a.vx,Math.cos(a.mobileAngle)*a.mobileSpd,0.02);
      a.vy=lerp(a.vy,Math.sin(a.mobileAngle)*a.mobileSpd,0.02);
    }
    a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpd;
  }
  asteroids=asteroids.filter(a=>a.x>-300&&a.x<WORLD+300&&a.y>-300&&a.y<WORLD+300);

  // Collision: ship vs asteroids
  for(let a of asteroids){
    if(dist(ship,a)<SHIP_R+a.r){
      let dmgReduction=getDmgReduction();
      hp--;
      shakeMag=12;
      emitSparks(ship.x,ship.y,'#ff4444',15);
      let dx=ship.x-a.x,dy=ship.y-a.y,d=Math.hypot(dx,dy)||1;
      ship.vx+=dx/d*3;ship.vy+=dy/d*3;a.vx-=dx/d*1;a.vy-=dy/d*1;
      if(hp<=0){
        // Bank partial credits on death
        persistentCredits+=Math.floor(credits*0.5);
        totalCredits+=credits;totalRuns++;
        if(wave>bestWave)bestWave=wave;if(credits>bestCredits)bestCredits=credits;
        saveGame();
        state='over';emitSparks(ship.x,ship.y,'#ff8800',40);
      }
    }
  }

  // Towed debris vs asteroids
  towing=towing.filter(d=>{
    for(let a of asteroids){
      if(dist(d,a)<d.r+a.r){emitSparks(d.x,d.y,'#ffaa00',10);d.vx+=rand(-2,2);d.vy+=rand(-2,2);return false}
    }
    return true;
  });

  // Delivery
  let delivered=[];
  for(let d of towing){
    if(dist(d,{x:WORLD/2,y:WORLD/2})<STATION_R+d.r){
      let bonus=d.credits;
      credits+=bonus;
      addFloat(d.x,d.y,'+'+bonus+' CR','#ffd700');
      emitDelivery(d.x,d.y);delivered.push(d);
    }
  }
  if(delivered.length>0){
    debris=debris.filter(d=>!delivered.includes(d));
    towing=towing.filter(d=>!delivered.includes(d));
    let newWave=Math.floor(credits/500)+1;
    if(newWave>wave)wave=newWave;
  }

  if(debris.length<5+wave)spawnDebris();
  let targetAst=3+wave*2;
  if(asteroids.length<targetAst&&Math.random()<0.02)spawnAsteroid();

  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;p.vx*=0.97;p.vy*=0.97}
  particles=particles.filter(p=>p.life>0);

  // Floating texts
  for(let f of floatingTexts){f.y+=f.vy;f.life-=dt}
  floatingTexts=floatingTexts.filter(f=>f.life>0);

  if(shakeMag>0){shakeX=rand(-shakeMag,shakeMag);shakeY=rand(-shakeMag,shakeMag);shakeMag*=0.85;if(shakeMag<0.5)shakeMag=0}
  else{shakeX=shakeY=0}
}

// ─── SHOP ───
let shopScroll=0;
const SHOP_X=60,SHOP_W=320,SHOP_ROW_H=52;

function getUpgradeRects(){
  let rects=[];
  let y=140;
  for(let k in upgrades){
    let u=upgrades[k];
    rects.push({key:k,x:SHOP_X,y:y,w:SHOP_W,h:SHOP_ROW_H});
    y+=SHOP_ROW_H+8;
  }
  return rects;
}

function handleShopClick(){
  let rects=getUpgradeRects();
  for(let r of rects){
    let u=upgrades[r.key];
    if(u.level>=u.max)continue;
    let cost=u.cost(u.level);
    if(persistentCredits<cost)continue;
    if(mouse.x>=r.x&&mouse.x<=r.x+r.w&&mouse.y>=r.y&&mouse.y<=r.y+r.h){
      persistentCredits-=cost;
      u.level++;
      saveGame();
      return;
    }
  }
  // Close button
  if(mouse.x>=W-80&&mouse.x<=W-20&&mouse.y>=20&&mouse.y<=50){state='play'}
}

function drawShop(t){
  X.fillStyle='rgba(5,6,13,0.92)';X.fillRect(0,0,W,H);

  X.textAlign='left';
  X.fillStyle='#ffd700';X.font='bold 24px monospace';
  X.fillText('SHIP UPGRADES',SHOP_X,60);
  X.fillStyle='#88aacc';X.font='14px monospace';
  X.fillText('⬡ '+persistentCredits+' CR banked',SHOP_X,85);
  X.fillStyle='#556677';X.font='12px monospace';
  X.fillText('Click to buy  •  Press U or click ✕ to close',SHOP_X,110);

  // Close button
  X.fillStyle='rgba(255,60,60,0.6)';X.font='bold 18px monospace';X.textAlign='center';
  X.fillText('✕',W-50,40);

  let rects=getUpgradeRects();
  X.textAlign='left';
  for(let r of rects){
    let u=upgrades[r.key];
    let canBuy=u.level<u.max&&persistentCredits>=u.cost(u.level);
    let maxed=u.level>=u.max;

    // Background
    X.fillStyle=maxed?'rgba(40,80,40,0.2)':canBuy?'rgba(20,40,80,0.4)':'rgba(40,20,20,0.2)';
    X.fillRect(r.x,r.y,r.w,r.h);
    X.strokeStyle=maxed?'rgba(60,120,60,0.3)':canBuy?'rgba(60,120,200,0.4)':'rgba(80,40,40,0.3)';
    X.lineWidth=1;X.strokeRect(r.x,r.y,r.w,r.h);

    // Name + level bar
    X.fillStyle=canBuy?'#aaccee':'#667788';X.font='bold 14px monospace';
    X.fillText(u.name,r.x+10,r.y+20);
    // Level pips
    for(let i=0;i<u.max;i++){
      X.fillStyle=i<u.level?'#0cf':'rgba(60,80,100,0.3)';
      X.fillRect(r.x+10+i*14,r.y+28,10,6);
    }
    // Desc
    X.fillStyle='#667788';X.font='11px monospace';
    X.fillText(u.desc,r.x+10,r.y+46);
    // Cost
    X.textAlign='right';
    if(maxed){X.fillStyle='#4a8a4a';X.font='bold 12px monospace';X.fillText('MAX',r.x+r.w-10,r.y+24)}
    else{
      let cost=u.cost(u.level);
      X.fillStyle=persistentCredits>=cost?'#ffd700':'#664422';X.font='bold 12px monospace';
      X.fillText(cost+' CR',r.x+r.w-10,r.y+24);
    }
    X.textAlign='left';
  }

  // Stats
  X.fillStyle='#556677';X.font='12px monospace';X.textAlign='left';
  let sy=140+Object.keys(upgrades).length*(SHOP_ROW_H+8)+20;
  X.fillText('─── STATS ───',SHOP_X,sy);
  X.fillText('Speed: x'+getSpeedMult().toFixed(2)+'  Hull: '+getMaxHp()+'  Tow: '+getMaxTow(),SHOP_X,sy+18);
  X.fillText('Grab: '+Math.round(getGrabRange())+'px  Drones: '+getDroneCount()+'  Station Pull: x'+(1+getStationPull()).toFixed(2),SHOP_X,sy+36);
}

function drawShip(cx,cy){
  X.save();X.translate(ship.x-cx,ship.y-cy);X.rotate(ship.angle);
  X.shadowColor='#00ffff';X.shadowBlur=15;
  X.beginPath();X.moveTo(SHIP_R,0);X.lineTo(-SHIP_R*0.7,-SHIP_R*0.6);X.lineTo(-SHIP_R*0.3,0);X.lineTo(-SHIP_R*0.7,SHIP_R*0.6);X.closePath();
  X.fillStyle='#0cf';X.fill();X.strokeStyle='#aff';X.lineWidth=1.5;X.stroke();
  X.shadowBlur=0;X.restore();
}

function drawDebris(d,cx,cy){
  X.save();X.translate(d.x-cx,d.y-cy);X.rotate(d.rot);
  X.beginPath();
  for(let i=0;i<d.verts.length;i++){let v=d.verts[i];i===0?X.moveTo(v.x,v.y):X.lineTo(v.x,v.y)}
  X.closePath();
  X.fillStyle=d.color;X.globalAlpha=0.85;X.fill();
  X.strokeStyle=d.name==='rare alloy'?'#cc88ff':'#ffdd88';X.lineWidth=1;X.globalAlpha=1;X.stroke();
  if(towing.includes(d)){X.strokeStyle='#0ff';X.lineWidth=2;X.setLineDash([4,4]);X.stroke();X.setLineDash([])}
  X.restore();
}

function drawAsteroid(a,cx,cy,t){
  X.save();X.translate(a.x-cx,a.y-cy);X.rotate(a.rot);
  X.beginPath();
  for(let i=0;i<a.verts.length;i++){let v=a.verts[i];i===0?X.moveTo(v.x,v.y):X.lineTo(v.x,v.y)}
  X.closePath();
  X.fillStyle=a.color;X.fill();X.strokeStyle='rgba(180,160,140,0.4)';X.lineWidth=1;X.stroke();
  if(a.mobile){
    let pulse=0.15+Math.sin(t*0.004+a.glowPhase)*0.1;
    X.shadowColor='#ff4422';X.shadowBlur=8;
    X.strokeStyle=`rgba(255,80,40,${pulse})`;X.lineWidth=2;X.stroke();X.shadowBlur=0;
  }
  X.restore();
}

function drawStation(cx,cy,t){
  let sx=WORLD/2-cx,sy=WORLD/2-cy;
  X.strokeStyle='rgba(60,140,255,0.06)';X.lineWidth=1;X.setLineDash([8,12]);
  X.beginPath();X.arc(sx,sy,STATION_R*2.5,0,6.2832);X.stroke();X.setLineDash([]);
  let g=X.createRadialGradient(sx,sy,STATION_R*0.3,sx,sy,STATION_R*2);
  g.addColorStop(0,'rgba(60,140,255,0.12)');g.addColorStop(0.5,'rgba(40,100,200,0.04)');g.addColorStop(1,'rgba(60,140,255,0)');
  X.fillStyle=g;X.beginPath();X.arc(sx,sy,STATION_R*2,0,6.2832);X.fill();
  let pulse=1+Math.sin(t*0.002)*0.03;
  X.save();X.translate(sx,sy);X.rotate(t*0.0003);
  X.beginPath();
  for(let i=0;i<6;i++){let a=Math.PI*2/6*i-Math.PI/6,r=STATION_R*pulse;i===0?X.moveTo(Math.cos(a)*r,Math.sin(a)*r):X.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
  X.closePath();X.fillStyle='rgba(30,50,80,0.6)';X.fill();
  X.strokeStyle=`rgba(80,160,255,${0.4+Math.sin(t*0.003)*0.15})`;X.lineWidth=2.5;X.stroke();
  X.beginPath();
  for(let i=0;i<6;i++){let a=Math.PI*2/6*i-Math.PI/6,r=STATION_R*0.55*pulse;i===0?X.moveTo(Math.cos(a)*r,Math.sin(a)*r):X.lineTo(Math.cos(a)*r,Math.sin(a)*r)}
  X.closePath();X.strokeStyle='rgba(100,180,255,0.25)';X.lineWidth=1.5;X.stroke();
  for(let i=0;i<3;i++){let a=Math.PI*2/3*i;X.strokeStyle='rgba(80,150,240,0.15)';X.lineWidth=1;X.beginPath();X.moveTo(Math.cos(a)*STATION_R*0.55*pulse,Math.sin(a)*STATION_R*0.55*pulse);X.lineTo(Math.cos(a+Math.PI)*STATION_R*0.55*pulse,Math.sin(a+Math.PI)*STATION_R*0.55*pulse);X.stroke()}
  for(let i=0;i<4;i++){let a=Math.PI*2/4*i+t*0.001,lx=Math.cos(a)*STATION_R*0.85*pulse,ly=Math.sin(a)*STATION_R*0.85*pulse,blink=Math.sin(t*0.008+i*1.5)>0?0.8:0.2;X.fillStyle=`rgba(100,200,255,${blink})`;X.beginPath();X.arc(lx,ly,2.5,0,6.2832);X.fill()}
  let coreGlow=X.createRadialGradient(0,0,0,0,0,8);
  coreGlow.addColorStop(0,'rgba(180,220,255,0.8)');coreGlow.addColorStop(1,'rgba(60,140,255,0)');
  X.fillStyle=coreGlow;X.beginPath();X.arc(0,0,8,0,6.2832);X.fill();
  X.fillStyle='rgba(200,230,255,0.9)';X.beginPath();X.arc(0,0,3,0,6.2832);X.fill();
  X.rotate(-t*0.0006);
  for(let side of[-1,1]){X.fillStyle='rgba(40,60,100,0.5)';X.fillRect(side*STATION_R*0.7,-4,side*STATION_R*0.5,8);X.strokeStyle='rgba(80,140,220,0.3)';X.lineWidth=0.5;X.strokeRect(side*STATION_R*0.7,-4,side*STATION_R*0.5,8);for(let j=1;j<4;j++){X.beginPath();X.moveTo(side*STATION_R*0.7+side*j*STATION_R*0.125,-4);X.lineTo(side*STATION_R*0.7+side*j*STATION_R*0.125,4);X.stroke()}}
  X.restore();
}

function drawDrones(cx,cy,t){
  for(let i=0;i<drones.length;i++){
    let d=drones[i];
    let sx=d.x-cx,sy=d.y-cy;
    // Small drone shape
    let bob=Math.sin(t*0.005+i*2)*3;
    X.fillStyle='rgba(100,200,100,0.7)';
    X.beginPath();X.arc(sx,sy+bob,4,0,6.2832);X.fill();
    X.strokeStyle='rgba(100,255,100,0.3)';X.lineWidth=1;X.stroke();
    // Tow line to target
    if(d.target){
      X.strokeStyle='rgba(100,255,100,0.15)';X.lineWidth=1;X.setLineDash([2,4]);
      X.beginPath();X.moveTo(sx,sy+bob);X.lineTo(d.target.x-cx,d.target.y-cy);X.stroke();X.setLineDash([]);
    }
  }
}

function drawGrabHint(cx,cy,t){
  if(towing.length>=getMaxTow())return;
  for(let d of debris){
    if(towing.includes(d))continue;
    let dd=dist(ship,d);
    if(dd<getGrabRange()){
      let sx=d.x-cx,sy=d.y-cy;
      X.strokeStyle=`rgba(0,255,255,${0.3+Math.sin(t*0.005)*0.2})`;
      X.lineWidth=1;X.setLineDash([3,5]);
      X.beginPath();X.arc(sx,sy,d.r+8,0,6.2832);X.stroke();X.setLineDash([]);
    }
  }
}

function drawTowLines(cx,cy,t){
  for(let i=0;i<towing.length;i++){
    let d=towing[i],alpha=0.3+Math.sin(t*0.006+i)*0.15;
    X.strokeStyle=`rgba(0,255,255,${alpha})`;X.lineWidth=1.5;X.setLineDash([4,6]);
    X.beginPath();X.moveTo(ship.x-cx,ship.y-cy);X.lineTo(d.x-cx,d.y-cy);X.stroke();X.setLineDash([]);
  }
}

function drawHUD(t){
  X.textAlign='left';
  X.fillStyle='#ffd700';X.font='bold 20px monospace';
  X.fillText('⬡ '+credits+' CR',20,35);
  X.fillStyle='#88aacc';X.font='14px monospace';
  X.fillText('WAVE '+wave+'  •  Banked: '+persistentCredits,20,58);

  // HP
  X.textAlign='right';
  let mhp=getMaxHp();
  for(let i=0;i<mhp;i++){
    X.fillStyle=i<hp?'#ff4466':'#331122';
    let bx=W-40-i*18;
    if(bx>W-200){X.fillRect(bx,18,14,14)}
  }
  X.fillStyle='#ff6688';X.font='12px monospace';X.fillText('HULL '+hp+'/'+mhp,W-20,46);

  // Shop hint
  X.textAlign='right';X.fillStyle='rgba(100,180,255,0.5)';X.font='12px monospace';
  X.fillText('[U] Upgrades',W-20,65);

  // Tow indicator
  X.textAlign='center';
  if(towing.length>0){
    let totalMass=getTowMass(),totalCredits=towing.reduce((s,d)=>s+d.credits,0);
    let baseSpd=1/(1+totalMass*0.35)*getSpeedMult();
    let slowPct=Math.round((1-baseSpd/getSpeedMult())*100);
    X.fillStyle='#0ff';X.font='13px monospace';
    X.fillText(`TOWING ${towing.length}/${getMaxTow()} — ${totalCredits} CR — SPEED -${slowPct}%`,W/2,H-55);
    X.fillStyle='rgba(150,200,220,0.35)';X.font='11px monospace';
    X.fillText('Reach station to deliver  •  Asteroid hits drop cargo',W/2,H-35);
  }else{
    X.fillStyle='rgba(150,200,220,0.4)';X.font='12px monospace';
    X.fillText('Click debris to grapple  •  Tow to station  •  [U] Upgrades',W/2,H-30);
  }

  // Minimap
  let mm=100,mmx=W-mm-15,mmy=H-mm-15;
  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(mmx,mmy,mm,mm);
  X.strokeStyle='rgba(80,80,100,0.5)';X.lineWidth=1;X.strokeRect(mmx,mmy,mm,mm);
  X.fillStyle='#4488ff';X.fillRect(mmx+mm/2-2,mmy+mm/2-2,4,4);
  X.fillStyle='#e8922a';for(let d of debris){X.fillRect(mmx+d.x/WORLD*mm-1,mmy+d.y/WORLD*mm-1,2,2)}
  X.fillStyle='#665544';for(let a of asteroids){X.fillRect(mmx+a.x/WORLD*mm-1,mmy+a.y/WORLD*mm-1,2,2)}
  X.fillStyle='#0ff';X.fillRect(mmx+ship.x/WORLD*mm-2,mmy+ship.y/WORLD*mm-2,4,4);
}

function render(t){
  X.fillStyle='#05060d';X.fillRect(0,0,W,H);

  if(state==='shop'){drawShop(t);return}

  let cx=ship.x-W/2+shakeX,cy=ship.y-H/2+shakeY;

  for(let s of stars){
    let sx=(s.x-cx*s.p)%W,sy=(s.y-cy*s.p)%H;if(sx<0)sx+=W;if(sy<0)sy+=H;
    X.fillStyle=`rgba(200,210,255,${s.b*(0.5+Math.sin(t*0.001+s.x)*0.3)})`;
    X.beginPath();X.arc(sx,sy,s.s,0,6.2832);X.fill();
  }

  if(state==='play'||state==='over'){
    drawStation(cx,cy,t);
    for(let d of debris)drawDebris(d,cx,cy);
    for(let a of asteroids)drawAsteroid(a,cx,cy,t);
    drawDrones(cx,cy,t);
    drawTowLines(cx,cy,t);
    drawGrabHint(cx,cy,t);
    if(state==='play')drawShip(cx,cy);

    // Floating texts
    for(let f of floatingTexts){
      X.fillStyle=f.color;X.globalAlpha=Math.min(1,f.life);X.font='bold 14px monospace';X.textAlign='center';
      X.fillText(f.text,f.x-cx,f.y-cy);X.globalAlpha=1;
    }

    for(let p of particles){
      let c=p.color==='thrust'?`rgba(0,200,255,${p.life})`:p.color==='credit'?`rgba(255,215,0,${p.life})`:p.color==='beam'?`rgba(0,255,255,${p.life*0.7})`:`rgba(${p.color==='#ff4444'?'255,60,60':'255,170,0'},${p.life})`;
      X.fillStyle=c;X.beginPath();X.arc(p.x-cx,p.y-cy,p.s*p.life,0,6.2832);X.fill();
    }
  }

  if(state==='play')drawHUD(t);

  if(state==='menu'){
    X.fillStyle='rgba(5,6,13,0.7)';X.fillRect(0,0,W,H);
    X.textAlign='center';
    X.fillStyle='#0cf';X.font='bold 52px monospace';
    X.fillText('SALVAGE DRIFT',W/2,H/2-100);
    X.fillStyle='#88aacc';X.font='18px monospace';
    X.fillText('Tow debris to your station. Avoid asteroids.',W/2,H/2-50);
    // Persistent stats
    if(persistentCredits>0||totalRuns>0){
      X.fillStyle='#556677';X.font='13px monospace';
      X.fillText(`Banked: ${persistentCredits} CR  •  Runs: ${totalRuns}  •  Best: Wave ${bestWave}, ${bestCredits} CR`,W/2,H/2-20);
    }
    X.fillStyle=`rgba(0,255,255,${0.5+Math.sin(t*0.004)*0.3})`;X.font='20px monospace';
    X.fillText('Click or press SPACE to launch',W/2,H/2+25);
    if(persistentCredits>0){
      X.fillStyle='rgba(100,180,255,0.5)';X.font='14px monospace';
      X.fillText('[U] Spend banked credits on upgrades',W/2,H/2+55);
    }
    X.fillStyle='#445566';X.font='13px monospace';
    X.fillText('WASD = thrust  •  Mouse = aim  •  Click = grapple  •  U = upgrades',W/2,H/2+85);
  }

  if(state==='over'){
    X.fillStyle='rgba(5,6,13,0.75)';X.fillRect(0,0,W,H);
    X.textAlign='center';
    X.fillStyle='#ff4466';X.font='bold 42px monospace';
    X.fillText('SHIP DESTROYED',W/2,H/2-70);
    X.fillStyle='#ffd700';X.font='24px monospace';
    X.fillText(`${credits} CR earned  •  50% banked: ${Math.floor(credits*0.5)} CR`,W/2,H/2-20);
    X.fillText(`Wave ${wave}  •  Total banked: ${persistentCredits+Math.floor(credits*0.5)} CR`,W/2,H/2+15);
    X.fillStyle=`rgba(200,200,220,${0.5+Math.sin(t*0.004)*0.3})`;X.font='18px monospace';
    X.fillText('Click or press SPACE to continue',W/2,H/2+65);
    X.fillStyle='rgba(100,180,255,0.4)';X.font='14px monospace';
    X.fillText('Spend banked credits on upgrades before next run',W/2,H/2+95);
  }
}

function loop(t){
  let dt=(t-lastT)/1000;lastT=t;if(dt>0.2)dt=0.016;
  update(dt);render(t);
  requestAnimationFrame(loop);
}
initStars();initShip();
requestAnimationFrame(loop);
</script>
</body>
</html>
